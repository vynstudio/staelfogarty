<!-- 
  STAEL FOGARTI — CHATBOT WIDGET
  Drop this file into any page with: <script src="chatbot.js"></script>
  Or include the contents directly before </body>
-->

<div id="sf-chatbot">
  <!-- Bubble -->
  <div id="sf-bubble" onclick="sfChat.toggle()">
    <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    <div id="sf-bubble-ping"></div>
  </div>

  <!-- Chat Window -->
  <div id="sf-window" class="sf-hidden">
    <!-- Header -->
    <div id="sf-header">
      <div id="sf-header-info">
        <div id="sf-avatar">S</div>
        <div>
          <div id="sf-header-name">Stael</div>
          <div id="sf-header-status"><span id="sf-status-dot"></span> Online — typically replies instantly</div>
        </div>
      </div>
      <button id="sf-close" onclick="sfChat.toggle()" aria-label="Close chat">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4l10 10M14 4L4 14"/></svg>
      </button>
    </div>

    <!-- Messages -->
    <div id="sf-messages"></div>

    <!-- Quick Replies -->
    <div id="sf-quick-replies"></div>

    <!-- Input -->
    <div id="sf-input-area">
      <input type="text" id="sf-input" placeholder="Type your message..." onkeydown="if(event.key==='Enter')sfChat.sendUser()">
      <button id="sf-send" onclick="sfChat.sendUser()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/></svg>
      </button>
    </div>
  </div>
</div>

<style>
/* ═══════════════════════════════════════════
   CHATBOT VARIABLES
   ═══════════════════════════════════════════ */
#sf-chatbot {
  --sf-blue: #5B8EC9;
  --sf-blue-deep: #4A78B0;
  --sf-blue-wash: #EBF2FA;
  --sf-peach: #F2A07B;
  --sf-peach-wash: #FFF2EB;
  --sf-mint: #8FC5B5;
  --sf-mint-wash: #EFF9F5;
  --sf-lav: #B8A9D4;
  --sf-lav-wash: #F5F1FB;
  --sf-bg: #FEFBF6;
  --sf-white: #FFFFFF;
  --sf-dark: #2A2A3A;
  --sf-text: #3D3D50;
  --sf-text-muted: #7C7C96;
  --sf-border: #EDECF0;
  --sf-radius: 18px;

  font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
}

/* ═══════════════════════════════════════════
   BUBBLE
   ═══════════════════════════════════════════ */
#sf-bubble {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: var(--sf-blue);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: 0 8px 32px rgba(91,142,201,0.4);
  transition: all 0.3s;
  position: relative;
}
#sf-bubble:hover {
  transform: scale(1.08);
  box-shadow: 0 12px 40px rgba(91,142,201,0.5);
}

#sf-bubble-ping {
  position: absolute; top: -2px; right: -2px;
  width: 18px; height: 18px;
  background: var(--sf-peach);
  border-radius: 50%;
  border: 3px solid var(--sf-white);
  animation: sf-ping 2s ease-in-out infinite;
}

@keyframes sf-ping {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}

/* ═══════════════════════════════════════════
   CHAT WINDOW
   ═══════════════════════════════════════════ */
#sf-window {
  position: absolute;
  bottom: 80px; right: 0;
  width: 390px;
  max-height: 580px;
  background: var(--sf-bg);
  border-radius: 24px;
  box-shadow: 0 24px 64px rgba(42,42,58,0.15);
  display: flex; flex-direction: column;
  overflow: hidden;
  animation: sf-slideUp 0.35s cubic-bezier(0.34,1.56,0.64,1);
  border: 1px solid var(--sf-border);
}

#sf-window.sf-hidden {
  display: none;
}

@keyframes sf-slideUp {
  from { opacity: 0; transform: translateY(16px) scale(0.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ═══════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════ */
#sf-header {
  padding: 18px 20px;
  background: var(--sf-white);
  border-bottom: 1px solid var(--sf-border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}

#sf-header-info { display: flex; align-items: center; gap: 12px; }

#sf-avatar {
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--sf-blue);
  color: var(--sf-white);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 1.1rem;
}

#sf-header-name {
  font-weight: 800; font-size: 1rem;
  color: var(--sf-dark);
}
#sf-header-status {
  font-size: 0.75rem; color: var(--sf-text-muted);
  display: flex; align-items: center; gap: 5px;
}
#sf-status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #4ADE80;
  display: inline-block;
}

#sf-close {
  background: none; border: none; cursor: pointer;
  color: var(--sf-text-muted); padding: 4px;
  border-radius: 8px; transition: all 0.2s;
}
#sf-close:hover { background: var(--sf-blue-wash); color: var(--sf-dark); }

/* ═══════════════════════════════════════════
   MESSAGES
   ═══════════════════════════════════════════ */
#sf-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px 12px;
  display: flex; flex-direction: column; gap: 10px;
  scroll-behavior: smooth;
}

#sf-messages::-webkit-scrollbar { width: 4px; }
#sf-messages::-webkit-scrollbar-thumb { background: var(--sf-border); border-radius: 4px; }

.sf-msg {
  max-width: 82%;
  padding: 12px 16px;
  border-radius: 18px;
  font-size: 0.9rem;
  line-height: 1.55;
  animation: sf-fadeIn 0.3s ease;
  word-wrap: break-word;
}

@keyframes sf-fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.sf-bot {
  background: var(--sf-white);
  color: var(--sf-text);
  align-self: flex-start;
  border-bottom-left-radius: 6px;
  box-shadow: 0 2px 8px rgba(42,42,58,0.04);
  border: 1px solid var(--sf-border);
}

.sf-user {
  background: var(--sf-blue);
  color: var(--sf-white);
  align-self: flex-end;
  border-bottom-right-radius: 6px;
}

.sf-typing {
  display: flex; gap: 5px; padding: 14px 18px;
  align-self: flex-start;
}
.sf-typing span {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--sf-text-muted);
  animation: sf-bounce 1.4s ease-in-out infinite;
}
.sf-typing span:nth-child(2) { animation-delay: 0.2s; }
.sf-typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes sf-bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

/* ═══════════════════════════════════════════
   QUICK REPLIES
   ═══════════════════════════════════════════ */
#sf-quick-replies {
  padding: 0 16px 8px;
  display: flex; flex-wrap: wrap; gap: 8px;
  flex-shrink: 0;
}

.sf-qr {
  padding: 9px 18px;
  border-radius: 100px;
  font-size: 0.84rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.25s;
  border: 1.5px solid var(--sf-border);
  background: var(--sf-white);
  color: var(--sf-text);
  font-family: 'Nunito', sans-serif;
}
.sf-qr:hover {
  border-color: var(--sf-blue);
  background: var(--sf-blue-wash);
  color: var(--sf-blue);
  transform: translateY(-1px);
}

.sf-qr-primary {
  background: var(--sf-blue);
  color: var(--sf-white);
  border-color: var(--sf-blue);
}
.sf-qr-primary:hover {
  background: var(--sf-blue-deep);
  border-color: var(--sf-blue-deep);
  color: var(--sf-white);
}

/* ═══════════════════════════════════════════
   INPUT
   ═══════════════════════════════════════════ */
#sf-input-area {
  padding: 12px 16px 16px;
  display: flex; gap: 8px;
  background: var(--sf-white);
  border-top: 1px solid var(--sf-border);
  flex-shrink: 0;
}

#sf-input {
  flex: 1;
  padding: 11px 16px;
  border: 1.5px solid var(--sf-border);
  border-radius: 14px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.9rem;
  color: var(--sf-text);
  outline: none;
  transition: border-color 0.2s;
  background: var(--sf-bg);
}
#sf-input:focus { border-color: var(--sf-blue); }
#sf-input::placeholder { color: var(--sf-text-muted); }

#sf-send {
  width: 42px; height: 42px;
  border-radius: 14px;
  background: var(--sf-blue);
  color: var(--sf-white);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
#sf-send:hover { background: var(--sf-blue-deep); transform: scale(1.05); }

/* ═══════════════════════════════════════════
   DATE/TIME PICKER INSIDE CHAT
   ═══════════════════════════════════════════ */
.sf-date-picker {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-top: 8px;
}
.sf-date-btn {
  padding: 10px 8px;
  border-radius: 12px;
  border: 1.5px solid var(--sf-border);
  background: var(--sf-white);
  font-family: 'Nunito', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--sf-text);
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  line-height: 1.3;
}
.sf-date-btn:hover {
  border-color: var(--sf-blue);
  background: var(--sf-blue-wash);
  color: var(--sf-blue);
}
.sf-date-btn span {
  display: block;
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--sf-text-muted);
}

.sf-time-picker {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
  margin-top: 8px;
}
.sf-time-btn {
  padding: 10px;
  border-radius: 12px;
  border: 1.5px solid var(--sf-border);
  background: var(--sf-white);
  font-family: 'Nunito', sans-serif;
  font-size: 0.84rem;
  font-weight: 700;
  color: var(--sf-text);
  cursor: pointer;
  transition: all 0.2s;
}
.sf-time-btn:hover {
  border-color: var(--sf-blue);
  background: var(--sf-blue-wash);
  color: var(--sf-blue);
}

/* Confirmation card */
.sf-confirm-card {
  background: var(--sf-mint-wash);
  border: 1.5px solid var(--sf-mint);
  border-radius: 14px;
  padding: 16px;
  margin-top: 8px;
  font-size: 0.88rem;
  line-height: 1.6;
}
.sf-confirm-card strong { color: var(--sf-dark); }
.sf-confirm-card .sf-confirm-row {
  display: flex; justify-content: space-between;
  padding: 4px 0;
  border-bottom: 1px solid rgba(143,197,181,0.2);
}
.sf-confirm-card .sf-confirm-row:last-child { border: none; }
.sf-confirm-label { color: var(--sf-text-muted); font-size: 0.82rem; }
.sf-confirm-value { font-weight: 700; color: var(--sf-dark); font-size: 0.85rem; }

/* ═══════════════════════════════════════════
   MOBILE RESPONSIVE
   ═══════════════════════════════════════════ */
@media (max-width: 480px) {
  #sf-chatbot { bottom: 16px; right: 16px; left: 16px; }
  #sf-window {
    width: auto; right: 0; left: 0; bottom: 72px;
    max-height: 70vh;
    border-radius: 20px;
  }
  #sf-bubble { width: 56px; height: 56px; }
}
</style>

<script>
const sfChat = (() => {
  // ── State ──
  let state = {
    open: false,
    step: 'init',
    booking: {
      service: null,
      date: null,
      time: null,
      name: null,
      email: null,
      phone: null,
      notes: null
    }
  };

  const services = [
    { id: 'live', label: '🎙️ Live Interpretation', short: 'Live Interpretation' },
    { id: 'virtual', label: '💻 Virtual Session', short: 'Virtual Session' },
    { id: 'medical', label: '🏥 Medical Interpretation', short: 'Medical Interpretation' },
    { id: 'legal', label: '⚖️ Legal Interpretation', short: 'Legal Interpretation' },
    { id: 'coaching', label: '📚 Language Coaching', short: 'Language Coaching' },
  ];

  const els = () => ({
    window: document.getElementById('sf-window'),
    bubble: document.getElementById('sf-bubble'),
    messages: document.getElementById('sf-messages'),
    qr: document.getElementById('sf-quick-replies'),
    input: document.getElementById('sf-input'),
  });

  // ── Helpers ──
  function scrollBottom() {
    const m = els().messages;
    setTimeout(() => m.scrollTop = m.scrollHeight, 50);
  }

  function addMsg(text, type = 'bot') {
    const div = document.createElement('div');
    div.className = `sf-msg sf-${type}`;
    div.innerHTML = text;
    els().messages.appendChild(div);
    scrollBottom();
  }

  function addCustom(html) {
    const div = document.createElement('div');
    div.className = 'sf-msg sf-bot';
    div.style.maxWidth = '92%';
    div.innerHTML = html;
    els().messages.appendChild(div);
    scrollBottom();
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'sf-msg sf-bot sf-typing';
    div.id = 'sf-typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    els().messages.appendChild(div);
    scrollBottom();
  }

  function hideTyping() {
    const t = document.getElementById('sf-typing');
    if (t) t.remove();
  }

  function setQR(buttons) {
    const qr = els().qr;
    qr.innerHTML = '';
    buttons.forEach(b => {
      const btn = document.createElement('button');
      btn.className = `sf-qr${b.primary ? ' sf-qr-primary' : ''}`;
      btn.textContent = b.label;
      btn.onclick = () => {
        addMsg(b.label, 'user');
        qr.innerHTML = '';
        b.action();
      };
      qr.appendChild(btn);
    });
  }

  function clearQR() { els().qr.innerHTML = ''; }

  function botSay(text, delay = 600) {
    return new Promise(resolve => {
      showTyping();
      setTimeout(() => {
        hideTyping();
        addMsg(text);
        resolve();
      }, delay);
    });
  }

  // ── Get next 6 available dates ──
  function getNextDates() {
    const dates = [];
    const now = new Date();
    let d = new Date(now);
    d.setDate(d.getDate() + 1);
    while (dates.length < 6) {
      const day = d.getDay();
      if (day !== 0) { // skip sundays
        dates.push(new Date(d));
      }
      d.setDate(d.getDate() + 1);
    }
    return dates;
  }

  function formatDateShort(d) {
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  }

  function formatDateDay(d) {
    return d.toLocaleDateString('en-US', { weekday: 'long' });
  }

  // ── Flow Steps ──

  async function startFlow() {
    state.step = 'greeting';
    await botSay("Hi there! 👋 I'm Stael's assistant. I can help you book a session or answer questions.", 800);
    await botSay("What would you like to do?", 500);

    setQR([
      { label: '📅 Book a Session', primary: true, action: () => stepService() },
      { label: '💬 Ask a Question', action: () => stepFreeChat() },
      { label: '📋 View Services', action: () => stepViewServices() },
    ]);
  }

  async function stepViewServices() {
    state.step = 'view-services';
    let html = "Here's what Stael offers:<br><br>";
    services.forEach(s => {
      html += `${s.label}<br>`;
    });
    await botSay(html, 700);
    await botSay("Would you like to book one of these?", 500);
    setQR([
      { label: '📅 Yes, book now', primary: true, action: () => stepService() },
      { label: '💬 I have a question', action: () => stepFreeChat() },
    ]);
  }

  async function stepService() {
    state.step = 'service';
    await botSay("Which service do you need?", 500);

    const qr = els().qr;
    qr.innerHTML = '';
    services.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'sf-qr';
      btn.textContent = s.short;
      btn.onclick = () => {
        state.booking.service = s.short;
        addMsg(s.label, 'user');
        qr.innerHTML = '';
        stepDate();
      };
      qr.appendChild(btn);
    });
  }

  async function stepDate() {
    state.step = 'date';
    await botSay(`Great choice! When would you like your <strong>${state.booking.service}</strong> session?`, 600);

    const dates = getNextDates();
    let html = `Pick a date:<div class="sf-date-picker">`;
    dates.forEach((d, i) => {
      const dayName = d.toLocaleDateString('en-US', { weekday: 'short' });
      const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      html += `<button class="sf-date-btn" onclick="sfChat.pickDate('${d.toISOString()}','${formatDateShort(d)}')">${dayName}<span>${dateStr}</span></button>`;
    });
    html += `</div>`;
    addCustom(html);
  }

  function pickDate(iso, display) {
    state.booking.date = display;
    state.booking.dateISO = iso;
    addMsg(`📅 ${display}`, 'user');
    stepTime();
  }

  async function stepTime() {
    state.step = 'time';
    await botSay("What time works best?", 500);

    const times = ['9:00 AM', '10:00 AM', '11:00 AM', '1:00 PM', '2:00 PM', '3:00 PM', '4:00 PM', '5:00 PM'];
    let html = `<div class="sf-time-picker">`;
    times.forEach(t => {
      html += `<button class="sf-time-btn" onclick="sfChat.pickTime('${t}')">${t}</button>`;
    });
    html += `</div>`;
    addCustom(html);
  }

  function pickTime(time) {
    state.booking.time = time;
    addMsg(`🕐 ${time}`, 'user');
    stepName();
  }

  async function stepName() {
    state.step = 'name';
    await botSay("Perfect! What's your name?", 500);
    els().input.placeholder = 'Your full name...';
    els().input.focus();
  }

  async function stepEmail() {
    state.step = 'email';
    await botSay(`Nice to meet you, ${state.booking.name}! 😊 What's your email?`, 600);
    els().input.placeholder = 'your@email.com';
    els().input.focus();
  }

  async function stepPhone() {
    state.step = 'phone';
    await botSay("And a phone number? (optional — press Enter to skip)", 500);
    els().input.placeholder = '(555) 555-5555 or press Enter to skip';
    els().input.focus();
  }

  async function stepNotes() {
    state.step = 'notes';
    await botSay("Anything else Stael should know before the session? (optional — press Enter to skip)", 500);
    els().input.placeholder = 'Any details or just press Enter...';
    els().input.focus();
  }

  async function stepConfirm() {
    state.step = 'confirm';
    const b = state.booking;

    let html = `Here's your booking summary:
      <div class="sf-confirm-card">
        <div class="sf-confirm-row"><span class="sf-confirm-label">Service</span><span class="sf-confirm-value">${b.service}</span></div>
        <div class="sf-confirm-row"><span class="sf-confirm-label">Date</span><span class="sf-confirm-value">${b.date}</span></div>
        <div class="sf-confirm-row"><span class="sf-confirm-label">Time</span><span class="sf-confirm-value">${b.time}</span></div>
        <div class="sf-confirm-row"><span class="sf-confirm-label">Name</span><span class="sf-confirm-value">${b.name}</span></div>
        <div class="sf-confirm-row"><span class="sf-confirm-label">Email</span><span class="sf-confirm-value">${b.email}</span></div>
        ${b.phone ? `<div class="sf-confirm-row"><span class="sf-confirm-label">Phone</span><span class="sf-confirm-value">${b.phone}</span></div>` : ''}
        ${b.notes ? `<div class="sf-confirm-row"><span class="sf-confirm-label">Notes</span><span class="sf-confirm-value">${b.notes}</span></div>` : ''}
      </div>`;

    await botSay(html, 700);
    await botSay("Does everything look good?", 400);

    setQR([
      { label: '✅ Confirm Booking', primary: true, action: () => stepBooked() },
      { label: '✏️ Start Over', action: () => { state.booking = {}; stepService(); } },
    ]);
  }

  async function stepBooked() {
    state.step = 'booked';

    // Send booking data (replace with real endpoint)
    try {
      console.log('BOOKING DATA:', JSON.stringify(state.booking));
      // TODO: Replace with actual API endpoint
      // await fetch('/api/book', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(state.booking) });
    } catch(e) { console.error(e); }

    await botSay("🎉 <strong>You're all set!</strong> Your session has been booked.", 800);
    await botSay(`Stael will send you a confirmation email at <strong>${state.booking.email}</strong> with all the details and a calendar invite.`, 700);
    await botSay("Thanks for choosing Stael — see you soon! 😊", 500);

    setQR([
      { label: '📅 Book Another', action: () => { state.booking = {}; stepService(); } },
      { label: '💬 Ask a Question', action: () => stepFreeChat() },
    ]);
  }

  // ── Free Chat (AI) ──
  async function stepFreeChat() {
    state.step = 'free-chat';
    await botSay("Sure! Type your question and I'll do my best to help. If I can't answer, I'll connect you with Stael directly. 😊", 700);
    els().input.placeholder = 'Ask me anything...';
    els().input.focus();
    clearQR();
  }

  async function handleAIQuestion(text) {
    showTyping();

    const systemPrompt = `You are Stael Fogarty's friendly assistant on her website. Stael is a professional English-Portuguese interpreter, certified translator, and language teacher based in Orlando, FL. 

Services she offers:
1. Live Interpretation — real-time EN↔PT for meetings, events, conferences
3. Virtual Sessions — remote interpretation via Zoom/phone
4. Medical Interpretation — healthcare appointments & consultations
5. Legal Interpretation — court, depositions, legal meetings
6. Language Coaching — personalized English & Portuguese lessons

  // ── Handle User Input ──
  function sendUser() {
    const input = els().input;
    const text = input.value.trim();
    if (!text && state.step !== 'phone' && state.step !== 'notes') return;

    if (text) addMsg(text, 'user');
    input.value = '';
    clearQR();

    switch(state.step) {
      case 'name':
        state.booking.name = text;
        stepEmail();
        break;
      case 'email':
        if (!text.includes('@')) {
          botSay("Hmm, that doesn't look like a valid email. Could you try again?", 400);
          return;
        }
        state.booking.email = text;
        stepPhone();
        break;
      case 'phone':
        state.booking.phone = text || null;
        stepNotes();
        break;
      case 'notes':
        state.booking.notes = text || null;
        stepConfirm();
        break;
      case 'free-chat':
        handleAIQuestion(text);
        break;
      default:
        // If they type during guided flow, treat as question
        handleAIQuestion(text);
    }
  }

  // ── Toggle ──
  function toggle() {
    state.open = !state.open;
    const w = els().window;
    const b = els().bubble;

    if (state.open) {
      w.classList.remove('sf-hidden');
      b.style.display = 'none';
      if (state.step === 'init') startFlow();
    } else {
      w.classList.add('sf-hidden');
      b.style.display = 'flex';
    }
  }

  return { toggle, sendUser, pickDate, pickTime };
})();
