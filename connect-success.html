<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Connected — Stael Gissoni</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,800;1,9..144,400&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FEFBF6;--white:#FFFFFF;--blue:#5B8EC9;--blue-deep:#4A78B0;--blue-wash:#EBF2FA;--mint:#8FC5B5;--mint-wash:#EFF9F5;--peach:#F2A07B;--dark:#2A2A3A;--text:#3D3D50;--text-muted:#7C7C96;--border:#EDECF0;--radius-md:18px;--radius-lg:24px;--radius-xl:32px;--shadow-md:0 8px 32px rgba(42,42,58,0.06);--shadow-blue:0 8px 28px rgba(91,142,201,0.28)}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{max-width:520px;width:100%;background:var(--white);border-radius:var(--radius-xl);padding:60px 48px;text-align:center;box-shadow:var(--shadow-md);border:1.5px solid var(--border);animation:slideUp 0.6s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.icon{font-size:4rem;margin-bottom:24px;display:block}
h1{font-family:'Fraunces',serif;font-size:2rem;font-weight:800;color:var(--dark);margin-bottom:12px}
.sub{font-size:1.05rem;color:var(--text-muted);line-height:1.7;margin-bottom:28px}
.status-card{background:var(--mint-wash);border:1.5px solid var(--mint);border-radius:var(--radius-md);padding:20px 24px;margin-bottom:28px;text-align:left}
.status-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(143,197,181,0.2);font-size:0.9rem}
.status-row:last-child{border:none}
.status-label{color:var(--text-muted)}
.status-val{font-weight:700;color:var(--dark)}
.status-val.ok{color:var(--mint)}
.status-val.pending{color:var(--peach)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:16px 36px;border-radius:var(--radius-md);font-family:'Nunito',sans-serif;font-weight:700;font-size:1rem;border:none;cursor:pointer;transition:all 0.3s;text-decoration:none}
.btn-primary{background:var(--blue);color:white;box-shadow:var(--shadow-blue)}
.btn-primary:hover{background:var(--blue-deep);transform:translateY(-2px)}
.nav-logo{font-family:'Fraunces',serif;font-size:1.55rem;font-weight:800;color:var(--dark);text-decoration:none;display:block;margin-bottom:32px}
.nav-logo span{color:var(--peach)}
.loading{color:var(--text-muted);font-size:0.9rem;margin-bottom:20px}
@media(max-width:480px){.card{padding:40px 24px}}
</style>
</head>
<body>
<div class="card">
  <a href="/" class="nav-logo">stael<span>.</span></a>
  <span class="icon" id="icon">⏳</span>
  <h1 id="title">Checking your account...</h1>
  <p class="sub" id="sub">Give us a moment to verify your Stripe setup.</p>

  <div class="status-card" id="status-card" style="display:none">
    <div class="status-row"><span class="status-label">Charges enabled</span><span class="status-val" id="s-charges">—</span></div>
    <div class="status-row"><span class="status-label">Payouts enabled</span><span class="status-val" id="s-payouts">—</span></div>
    <div class="status-row"><span class="status-label">Details submitted</span><span class="status-val" id="s-details">—</span></div>
    <div class="status-row"><span class="status-label">Account ID</span><span class="status-val" id="s-id" style="font-size:0.75rem">—</span></div>
  </div>

  <div id="action-area"></div>
</div>

<script>
async function checkStatus() {
  try {
    const res = await fetch('/.netlify/functions/connect-status');
    const data = await res.json();

    document.getElementById('status-card').style.display = 'block';
    document.getElementById('s-charges').textContent = data.chargesEnabled ? '✓ Yes' : '✗ Not yet';
    document.getElementById('s-charges').className = 'status-val ' + (data.chargesEnabled ? 'ok' : 'pending');
    document.getElementById('s-payouts').textContent = data.payoutsEnabled ? '✓ Yes' : '✗ Not yet';
    document.getElementById('s-payouts').className = 'status-val ' + (data.payoutsEnabled ? 'ok' : 'pending');
    document.getElementById('s-details').textContent = data.detailsSubmitted ? '✓ Complete' : '✗ Incomplete';
    document.getElementById('s-details').className = 'status-val ' + (data.detailsSubmitted ? 'ok' : 'pending');
    document.getElementById('s-id').textContent = data.accountId;

    if (data.ready) {
      document.getElementById('icon').textContent = '🎉';
      document.getElementById('title').textContent = 'You\'re all connected!';
      document.getElementById('sub').textContent = 'Stripe is set up and ready. Payments from bookings will go directly to your bank account. Vyn Studio handles the rest.';
      document.getElementById('action-area').innerHTML = '<a href="/" class="btn btn-primary">Back to your site →</a>';

      // Notify Vyn Studio
      fetch('https://formspree.io/f/xpwzgbqe', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          _subject: '✅ Stael Stripe Connect — Account Ready',
          message: `Account ${data.accountId} is fully onboarded. Charges: ${data.chargesEnabled}, Payouts: ${data.payoutsEnabled}. Set STAEL_CONNECT_READY=true in Netlify.`
        })
      }).catch(()=>{});

    } else {
      document.getElementById('icon').textContent = '⚠️';
      document.getElementById('title').textContent = 'Almost there!';
      document.getElementById('sub').textContent = 'Your account needs a few more details before it can accept payments. Click below to finish setting it up.';

      const missing = data.requirementsCurrentlyDue;
      const actionArea = document.getElementById('action-area');
      actionArea.innerHTML = `
        <a href="/.netlify/functions/connect-onboard?account=${data.accountId}" class="btn btn-primary" style="margin-bottom:12px;width:100%;justify-content:center;">
          Complete Stripe setup →
        </a>
        ${missing.length ? `<p style="font-size:0.82rem;color:var(--text-muted);margin-top:12px;">Still needed: ${missing.join(', ')}</p>` : ''}
      `;
    }
  } catch(e) {
    document.getElementById('icon').textContent = '❌';
    document.getElementById('title').textContent = 'Something went wrong';
    document.getElementById('sub').textContent = 'Could not verify your account status. Please contact hello@vyn.studio for help.';
  }
}

checkStatus();
</script>
</body>
</html>
